name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies (locked)
        run: uv sync --locked

      - name: Ruff lint
        if: ${{ !cancelled() }}
        run: uv run ruff check .

      - name: Ruff format
        if: ${{ !cancelled() }}
        run: uv run ruff format --check .

      - name: Pyright
        if: ${{ !cancelled() }}
        run: uv run pyright

      - name: Import contracts
        if: ${{ !cancelled() }}
        run: uv run lint-imports

      - name: Tests
        if: ${{ !cancelled() }}
        run: uv run pytest
